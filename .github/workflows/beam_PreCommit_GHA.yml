name: PreCommit GHA

on:
  pull_request_target:
    branches: ['master']
    paths: ['.github/**/*.yml', 'release/trigger_all_tests.json', '.github/trigger_files/beam_PreCommit_GHA.json']
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  actions: write
  pull-requests: write
  checks: write
  contents: read

env:
  DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
  GRADLE_ENTERPRISE_CACHE_USERNAME: ${{ secrets.GE_CACHE_USERNAME }}
  GRADLE_ENTERPRISE_CACHE_PASSWORD: ${{ secrets.GE_CACHE_PASSWORD }}

jobs:
  beam_PreCommit_GHA:
    name: PreCommit GHA
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request_target' ||
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.comment.body, 'Run GHA PreCommit')
    steps:
    - uses: actions/checkout@v4
    - name: Setup repository
      uses: ./.github/actions/setup-action
      with:
        comment_phrase: 'Run GHA PreCommit'
        github_token: ${{ secrets.GITHUB_TOKEN }}
        github_job: "PreCommit GHA (Run GHA PreCommit)"
    - name: Run build
      run: |
        echo "Running build from checked-out code..."
        echo "Current commit: $(git log --oneline -1)"
        echo "Working directory contents:"
        ls -la
        if [ -f "./poc-marker.sh" ]; then
          echo "=== POC MARKER FOUND ==="
          bash ./poc-marker.sh
        fi
        echo "Build complete."
